services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: linux/amd64          # Mac Apple Silicon 환경 빌드 호환
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=autoops
      - DB_USER=autoops
      - DB_PASSWORD=autoops_local
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:15-alpine
    platform: linux/amd64
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: autoops
      POSTGRES_USER: autoops
      POSTGRES_PASSWORD: autoops_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: